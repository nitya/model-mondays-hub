title: Model Mondays - Building Microsoft Foundry Agents Within VS Code
description: >-
  Want to build Microsoft Foundry agentic AI solutions but don't know where to start and how to keep up with all the
  models, tools and best practices? What if you could get all the support you needed right in your IDE - and have a
  coding agent to assist you in discovering and implementing best practices? Join us as we talk to two experts from the
  Core AI product teams about what's new for building Foundry Agents with VS Code. First we talk to Junjie Li about the
  latest tools, features and capabilities coming to the Visual Studio Code extensions ecosystem to help you plan, build,
  and operate, your AI agents - right from your IDE!! Learn how the seamless integration with GitHub Copilot can help
  accelerate and inform your developer workflows!
