name: validate-data

# Runs schema + cross-reference validation and builds the Astro site on every
# PR that touches data, content, site source, or build/validation scripts.
# Fast, no secrets required — a good gate before merging any Data Ops PR
# (including ones opened automatically by the Copilot coding agent).

on:
  pull_request:
    paths:
      - "data/**"
      - "content/**"
      - "scripts/**"
      - "site/src/**"
      - "site/package.json"
      - "site/astro.config.mjs"
      - "package.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install site dependencies
        run: npm install --no-audit --no-fund
        working-directory: site

      - name: Validate data
        run: npm run validate

      - name: Build site
        run: npm run build
        working-directory: site
